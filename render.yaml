services:
  - type: web
    name: ai-smart-schedule
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: DATABASE_PATH
        value: /var/data/database.db
      - key: FALLBACK_DATABASE_PATH
        value: /var/data/database_fallback.db
    disk:
      name: ai-smart-schedule-data
      mountPath: /var/data
      sizeGB: 1
